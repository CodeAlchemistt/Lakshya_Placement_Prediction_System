<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analytics | Lakshya</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>

<body class="bg-slate-50 min-h-screen text-slate-800">

    <nav class="bg-white border-b border-slate-200 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                <div class="flex-shrink-0 flex items-center gap-2">
                    <div
                        class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center text-white font-bold text-xl">
                        L</div>
                    <span class="font-bold text-xl tracking-tight text-slate-900">Lakshya</span>
                </div>
                <div class="hidden md:flex space-x-8">
                    <a href="{{ url_for('index') }}"
                        class="text-slate-500 hover:text-blue-600 font-medium transition-colors">Home</a>
                    <a href="{{ url_for('dashboard') }}"
                        class="text-slate-500 hover:text-blue-600 font-medium transition-colors">Engine</a>
                    <a href="{{ url_for('analytics') }}"
                        class="text-blue-600 font-semibold transition-colors">Analytics</a>
                    <a href="{{ url_for('about') }}"
                        class="text-slate-500 hover:text-blue-600 font-medium transition-colors">About</a>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
        <div class="mb-8 flex justify-between items-end">
            <div>
                <h2 class="text-3xl font-bold text-slate-900">Data Analytics</h2>
                <p class="text-slate-500 mt-2">Historical trends and dataset distribution.</p>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div
                class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 h-80 flex items-center justify-center flex-col text-slate-400">
                <svg class="w-12 h-12 mb-3 opacity-50" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z">
                    </path>
                </svg>
                <span class="font-medium">[ Chart 1: Feature Importance ]</span>
            </div>
            <div
                class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 h-80 flex items-center justify-center flex-col text-slate-400">
                <svg class="w-12 h-12 mb-3 opacity-50" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M11 3.055A9.001 9.001 0 1020.945 13H11V3.055z"></path>
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M20.488 9H15V3.512A9.025 9.025 0 0120.488 9z"></path>
                </svg>
                <span class="font-medium">[ Chart 2: Placement Distribution ]</span>
            </div>
            <div
                class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 h-80 md:col-span-2 flex items-center justify-center flex-col text-slate-400">
                <span class="font-medium">[ Chart 3: Correlation Matrix ]</span>
            </div>
        </div>
    </main>

</body>

</html>
