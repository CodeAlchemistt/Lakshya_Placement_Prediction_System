<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Engine | Lakshya</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>

<body class="bg-slate-50 min-h-screen text-slate-800">

    <nav class="bg-white border-b border-slate-200 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                <div class="flex-shrink-0 flex items-center gap-2">
                    <div
                        class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center text-white font-bold text-xl">
                        L</div>
                    <span class="font-bold text-xl tracking-tight text-slate-900">Lakshya</span>
                </div>
                <div class="hidden md:flex space-x-8">
                    <a href="{{ url_for('index') }}"
                        class="text-slate-500 hover:text-blue-600 font-medium transition-colors">Home</a>
                    <a href="{{ url_for('dashboard') }}"
                        class="text-blue-600 font-semibold transition-colors">Engine</a>
                    <a href="{{ url_for('analytics') }}"
                        class="text-slate-500 hover:text-blue-600 font-medium transition-colors">Analytics</a>
                    <a href="{{ url_for('about') }}"
                        class="text-slate-500 hover:text-blue-600 font-medium transition-colors">About</a>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
        <div class="mb-8">
            <h2 class="text-3xl font-bold text-slate-900">Prediction Engine</h2>
            <p class="text-slate-500 mt-2">Enter student metrics below to calculate placement probability.</p>
        </div>

        {% if prediction_text %}
        <div class="mb-8 p-5 rounded-xl flex items-start border-l-4 shadow-sm
            {% if 'Not' in prediction_text %} bg-red-50 border-red-500 text-red-800
            {% elif 'Error' in prediction_text %} bg-amber-50 border-amber-500 text-amber-800
            {% else %} bg-emerald-50 border-emerald-500 text-emerald-800 {% endif %}">
            <div class="font-bold text-lg">{{ prediction_text }}</div>
        </div>
        {% endif %}

        <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
            <div class="p-8">
                <form action="/predict" method="POST">
                    <div class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 gap-x-6 gap-y-8">
                        {% for feature in features %}
                        <div class="space-y-2">
                            <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider">
                                {{ feature.replace('_', ' ') }}
                            </label>
                            <input type="number" step="any" name="{{ feature }}" required
                                class="w-full bg-slate-50 border border-slate-200 text-slate-900 rounded-lg px-4 py-2.5 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 focus:bg-white transition-all outline-none">
                        </div>
                        {% endfor %}
                    </div>

                    <div class="mt-10 pt-6 border-t border-slate-100 flex justify-end">
                        <button type="submit"
                            class="px-8 py-3 bg-slate-900 hover:bg-blue-600 text-white font-semibold rounded-xl shadow-md hover:shadow-lg transition-all duration-200 flex items-center">
                            <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M9 3v2m6-2v2M9 19v2m6-2v2M5 9H3m2 6H3m18-6h-2m2 6h-2M7 19h10a2 2 0 002-2V7a2 2 0 00-2-2H7a2 2 0 00-2 2v10a2 2 0 002 2zM9 9h6v6H9V9z">
                                </path>
                            </svg>
                            Execute Model
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </main>

</body>

</html>
