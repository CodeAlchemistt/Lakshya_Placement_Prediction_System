<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prediction Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-50">

    <!-- Navbar -->
    <nav class="bg-white shadow-sm border-b border-slate-200">
        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
            <h1 class="text-2xl font-bold text-blue-700">PlacementAI</h1>

            <div class="space-x-6">
                <a href="{{ url_for('index') }}" class="text-slate-600 hover:text-blue-600">Home</a>
                <a href="{{ url_for('dashboard') }}" class="text-blue-600 font-semibold">Dashboard</a>
                <a href="{{ url_for('analytics') }}" class="text-slate-600 hover:text-blue-600">Analytics</a>
                <a href="{{ url_for('about') }}" class="text-slate-600 hover:text-blue-600">About</a>
            </div>
        </div>
    </nav>

    <div class="max-w-6xl mx-auto py-12 px-6">

        <h1 class="text-4xl font-bold text-slate-900">
            Placement Prediction Engine
        </h1>

        <p class="text-slate-600 mt-3">
            Enter student information to generate an AI-powered placement prediction.
        </p>

        <!-- Prediction Result -->
        {% if prediction_text %}
        <div class="mt-8 bg-green-50 border border-green-200 rounded-2xl p-6 shadow-sm">
            <h2 class="text-lg font-semibold text-green-700">
                Prediction Result
            </h2>

            <p class="mt-2 text-green-900 font-medium text-xl">
                {{ prediction_text }}
            </p>
        </div>
        {% endif %}

        <!-- Form -->
        <div class="mt-10 bg-white rounded-3xl shadow-xl p-8 border border-slate-100">

            <form action="/predict" method="POST">

                <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-6">

                    {% for feature in features %}
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-2">
                            {{ feature.replace('_', ' ').title() }}
                        </label>

                        <input type="number" name="{{ feature }}" step="any" required
                            class="w-full px-4 py-3 rounded-xl border border-slate-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition">
                    </div>
                    {% endfor %}

                </div>

                <div class="mt-10">
                    <button type="submit"
                        class="w-full bg-blue-600 hover:bg-blue-700 text-white py-4 rounded-xl font-semibold text-lg shadow-lg transition">
                        Run Prediction
                    </button>
                </div>

            </form>

        </div>

    </div>

</body>

</html>
