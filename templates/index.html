<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Placement Predictor API</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen flex flex-col items-center py-12">
    
    <div class="bg-white p-10 rounded-xl shadow-xl w-full max-w-5xl border-t-4 border-blue-600">
        <h1 class="text-4xl font-extrabold text-center text-gray-800 mb-2">Placement Prediction System</h1>
        <p class="text-center text-gray-500 mb-8">Enter student metrics to generate an AI placement probability.</p>
        
        {% if prediction_text %}
        <div class="mb-8 p-4 rounded-lg text-center text-2xl font-bold shadow-sm
            {% if 'Not' in prediction_text %} bg-red-100 text-red-700 border border-red-300
            {% elif 'Error' in prediction_text %} bg-yellow-100 text-yellow-700 border border-yellow-300
            {% else %} bg-green-100 text-green-700 border border-green-300 {% endif %}">
            {{ prediction_text }}
        </div>
        {% endif %}

        <form action="/predict" method="POST" class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 gap-6">
            {% for feature in features %}
            <div class="flex flex-col">
                <label class="text-xs font-bold text-gray-600 mb-2 uppercase tracking-wide">
                    {{ feature.replace('_', ' ') }}
                </label>
                <input type="number" step="any" name="{{ feature }}" required 
                       class="border border-gray-300 rounded-lg p-3 bg-gray-50 focus:bg-white focus:ring-2 focus:ring-blue-500 focus:outline-none transition-all">
            </div>
            {% endfor %}
            
            <div class="col-span-full mt-6">
                <button type="submit" class="w-full bg-blue-600 text-white font-bold text-lg py-4 rounded-lg hover:bg-blue-700 shadow-lg hover:shadow-xl transition-all duration-300">
                    Run Prediction Model
                </button>
            </div>
        </form>
    </div>

</body>
</html>
